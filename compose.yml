version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kanji-chan-app
    ports:
      - "8080:8080"
    environment:
      # OAuth 認証設定 (Google / GitHub OAuth 2.0)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-${OAUTH_CLIENT_ID:-your-google-client-id.apps.googleusercontent.com}}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-${OAUTH_CLIENT_SECRET:-your-google-client-secret}}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}

      # Cookie セッション署名用シークレット (未指定時は起動毎に自動ランダム生成)
      - SESSION_SECRET=${SESSION_SECRET:-}

      # 公開サイトURL設定 (OAuthリダイレクトURIもこのURLから自動生成されます)
      - PUBLIC_SITE_URL=${PUBLIC_SITE_URL:-http://localhost:8080}
    volumes:
      - kanji_data:/data
    restart: always

volumes:
  kanji_data:
