version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: kanji-chan-db
    environment:
      POSTGRES_USER: kanji_user
      POSTGRES_PASSWORD: kanji_password
      POSTGRES_DB: kanji_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kanji-chan-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=kanji_user
      - DB_PASSWORD=kanji_password
      - DB_NAME=kanji_db
      - DB_SSLMODE=disable
      - OAUTH_PROVIDER=google # または github
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI}
      - SESSION_SECRET=${SESSION_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: kanji-chan-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
