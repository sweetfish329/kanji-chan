version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kanji-chan-app
    ports:
      - "8080:8080"
    environment:
      # サーバー・データベース設定
      - PORT=8080
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DB_PATH=${DB_PATH:-/data/kanji.db}

      # OAuth 認証設定 (Google または GitHub OAuth 2.0)
      # - OAUTH_PROVIDER: "google" または "github"
      - OAUTH_PROVIDER=${OAUTH_PROVIDER:-google}
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID:-your-oauth-client-id.apps.googleusercontent.com}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET:-your-oauth-client-secret}
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI:-http://localhost:8080/api/auth/callback}

      # Cookie セッション署名用シークレット (未指定時は起動毎に自動ランダム生成)
      - SESSION_SECRET=${SESSION_SECRET:-}

      # 公開サイトURL設定 (SEO: robots.txt / sitemap.xml / OGP 用)
      - PUBLIC_SITE_URL=${PUBLIC_SITE_URL:-http://localhost:8080}
    volumes:
      - kanji_data:/data
    restart: always

volumes:
  kanji_data:
