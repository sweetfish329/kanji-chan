name: kanji-chan

services:
  app:
    image: ghcr.io/sweetfish329/kanji-chan:latest
    container_name: kanji-chan-app
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      # OAuth 認証設定 (Google / GitHub OAuth 2.0)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-${OAUTH_CLIENT_ID:-}}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-${OAUTH_CLIENT_SECRET:-}}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}

      # Cookie セッション署名用シークレット (プロダクションでは必ず指定)
      - SESSION_SECRET=${SESSION_SECRET}

      # 公開サイトURL設定 (SEOおよびOAuthリダイレクトURI自動生成用)
      - PUBLIC_SITE_URL=${PUBLIC_SITE_URL}

      # Gemini API キー (オプショナル: 幹事の個別設定がない場合のフォールバック用)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - kanji_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  kanji_data:
    driver: local
